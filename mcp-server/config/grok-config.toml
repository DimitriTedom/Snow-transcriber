# Merge into ~/.grok/config.toml (user scope) or .grok/config.toml (project scope).
# Replace ABSOLUTE_PATH_TO_REPO with your Snow-transcriber install path.
# Windows tip: use forward slashes in paths, e.g. D:/SnowDev/Videos/Youtube/CRAVE & CONQUER/Snow-transcriber

[mcp_servers.snow-transcriber]
command = "node"
args = ["ABSOLUTE_PATH_TO_REPO/mcp-server/dist/index.js"]
env = { SNOW_ENGINE_URL = "http://localhost:8000" }
enabled = true